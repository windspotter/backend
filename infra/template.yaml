AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Windspotter backend — serverless functions (currently spot enrichment)

Parameters:
  SpotModel:
    Type: String
    Default: claude-haiku-4-5
    Description: Anthropic model id used by the pipeline (haiku is the cheapest).

Globals:
  Function:
    Runtime: python3.12
    Architectures: [arm64]
    Timeout: 180
    MemorySize: 512

Resources:
  # --- Spot enrichment, behind a Function URL ---
  # To add another Lambda: create functions/<name>/ (handler.py + requirements.txt
  # + Makefile) and copy this block with a new logical ID + CodeUri.
  EnrichFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile          # builds via the repo-root Makefile (Docker-free)
    Properties:
      Handler: handler.handler
      # Repo root, so the build copy includes the shared spot_consultant package
      # (SAM builds from a copy of CodeUri and can't reach sibling folders).
      CodeUri: ..
      ReservedConcurrentExecutions: 2
      Environment:
        Variables:
          SPOT_MODEL: !Ref SpotModel
          ANTHROPIC_KEY_PARAM: /spot-consultant/anthropic-api-key
          API_TOKEN_PARAM: /spot-consultant/api-token
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: spot-consultant/*
      FunctionUrlConfig:
        AuthType: NONE               # public URL; the handler enforces x-api-token
        Cors:
          AllowOrigins: ['*']
          AllowMethods: ['*']
          AllowHeaders: ['content-type', 'x-api-token']

  # NOTE: a $10 cost budget used to live here, but AWS::Budgets::Budget is only
  # supported by CloudFormation in us-east-1 (Budgets is a global/us-east-1 service),
  # and this stack deploys to eu-north-1. Set the budget in the Billing console
  # (Budgets → Create budget) instead — it's region-agnostic. Spend is still bounded
  # by the Haiku model + ReservedConcurrentExecutions + your finite Anthropic balance.

Outputs:
  EnrichFunctionUrl:
    Description: Public Function URL for spot enrichment — call with an 'x-api-token' header.
    Value: !GetAtt EnrichFunctionUrl.FunctionUrl
